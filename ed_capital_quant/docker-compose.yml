version: "3.8"

services:
  quant_engine:
    build: .
    container_name: ed_capital_bot
    restart: always
    environment:
      - TZ=Europe/Istanbul
    env_file:
      - .env
    volumes:
      - ./paper_db.sqlite3:/app/paper_db.sqlite3
      - ./logs:/app/logs
      - ./models:/app/models
      - ./reports:/app/reports
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
