version: '3.8'

services:
  quant_engine:
    build: .
    container_name: ed_capital_quant_engine
    restart: always
    env_file:
      - .env
    environment:
      - TZ=Europe/Istanbul
    volumes:
      - ./data_storage:/app/data_storage
      - ./logs:/app/logs
      - ./reports:/app/reports
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  redis:
    image: redis:alpine
    container_name: quant_redis_cache
    restart: always
    volumes:
      - redis_data:/data

volumes:
  redis_data:
