version: '3.8'

services:
  quant_engine:
    build: .
    container_name: ed_capital_quant
    restart: always
    environment:
      - TZ=Europe/Istanbul
    env_file:
      - .env
    volumes:
      - ./db:/app/db
      - ./logs:/app/logs
      - ./models:/app/models
      - ./reports:/app/reports
    healthcheck:
      test: ["CMD", "python", "-c", "import sqlite3; sqlite3.connect('db/paper_db.sqlite3').close()"]
      interval: 1m
      timeout: 10s
      retries: 3