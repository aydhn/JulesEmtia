version: '3.8'

services:
  quant_engine:
    build: .
    container_name: ed_quant_engine
    restart: unless-stopped
    environment:
      - TZ=Europe/Istanbul  # Critical for Financial Timing Sync
      - LOG_LEVEL=INFO
    env_file:
      - .env
    volumes:
      # Persistent Storage Volumes (Phase 25 Rules)
      - ./data:/app/data
      - ./logs:/app/logs
      - ./models:/app/models
      - ./reports:/app/reports
    command: python main.py
