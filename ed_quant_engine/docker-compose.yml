version: '3.8'

services:
  quant_engine:
    build: .
    container_name: ed_quant_engine
    restart: always
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./models:/app/models
    environment:
      - TZ=Europe/Istanbul
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
