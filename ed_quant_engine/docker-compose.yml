version: "3.8"

services:
  quant_engine:
    build: .
    container_name: ed_quant_engine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=Europe/Istanbul  # Senkronizasyon için kritik
    volumes:
      - ./data:/app/data        # Veritabanı korunur
      - ./logs:/app/logs        # Loglar takip edilebilir
      - ./models:/app/models    # ML Model ve Optimizasyonlar
      - ./reports:/app/reports  # Rapor Çıktıları
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.2'
          memory: 512M
