version: '3.8'

services:
  quant_engine:
    build: .
    container_name: ed_quant_engine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=Europe/Istanbul # Timezone synchronization
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data        # SQLite persistence
      - ./logs:/app/logs        # Log persistence
      - ./models:/app/models    # ML Model persistence
      - ./reports:/app/reports  # Tear Sheet persistence
    deploy:
      resources:
        limits:
          memory: 2G            # High-availability resource capping
        reservations:
          memory: 512M
