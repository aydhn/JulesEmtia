version: '3.8'

services:
  quant_bot:
    build: .
    container_name: ed_quant_engine
    restart: always
    env_file:
      - .env
    environment:
      - TZ=Europe/Istanbul
    volumes:
      - ./data/paper_db.sqlite3:/app/data/paper_db.sqlite3
      - ./models:/app/models
      - ./logs:/app/logs
      - ./reports:/app/reports
