version: "3.8"

services:
  quant_engine:
    build: .
    container_name: ed_quant_engine
    restart: always
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - ADMIN_CHAT_ID=${ADMIN_CHAT_ID}
      - TZ=Europe/Istanbul
    volumes:
      - ./data:/home/quantuser/app/data
      - ./logs:/home/quantuser/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
