version: "3.8"

services:
  quant_bot:
    build: .
    container_name: ed_quant_engine
    restart: always
    environment:
      - TZ=Europe/Istanbul
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./models:/app/models
      - ./reports:/app/reports
