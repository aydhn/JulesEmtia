version: '3.8'

services:
  quant_engine:
    build: .
    container_name: ed_quant_engine
    restart: always # Otonom kurtarma / Recovery
    environment:
      - TZ=Europe/Istanbul # Kritik zaman dilimi senkronizasyonu
    env_file:
      - .env # Telegram tokenleri ve gizli veriler
    volumes:
      # Veritabanı ve modeller kalıcı olmalı (Host makineye bağlanmalı)
      - ./paper_db.sqlite3:/app/paper_db.sqlite3
      - ./models:/app/models
      - ./logs:/app/logs
      - ./reports:/app/reports
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
