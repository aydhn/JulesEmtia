version: '3.8'

services:
  quant_engine:
    build: .
    container_name: ed_quant_engine
    restart: always
    environment:
      - TZ=Europe/Istanbul # Synchronization of market time
    env_file:
      - .env
    volumes:
      - ./data:/app/data        # Critical: Persistent Local DB & ML Models
      - ./logs:/app/logs        # Critical: Persistent Logs for auditing
      - ./reports:/app/reports  # Persistent Tear Sheets
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
