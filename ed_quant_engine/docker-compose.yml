version: '3.8'

services:
  quant_engine:
    build: .
    container_name: ed_quant_engine
    restart: always
    environment:
      - TZ=Europe/Istanbul # Phase 25: Timezone Sync
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - ADMIN_CHAT_ID=${ADMIN_CHAT_ID}
    volumes:
      # Phase 25: Volume mapping to ensure Data Persistence across restarts
      - ./paper_db.sqlite3:/app/paper_db.sqlite3
      - ./logs:/app/logs
      - ./models:/app/models
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"\n