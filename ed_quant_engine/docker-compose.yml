version: '3.8'

services:
  quant_engine:
    build: .
    image: ed_quant_engine:latest
    container_name: ed_quant_bot
    restart: unless-stopped
    environment:
      - TZ=Europe/Istanbul
      - LOG_LEVEL=INFO
    env_file:
      - .env
    volumes:
      # Persistent Data Mapping to Host
      - ./data:/app/data
      - ./logs:/app/logs
      - ./models:/app/models
      - ./reports:/app/reports
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
