version: '3.8'

services:
  quant_bot:
    build: .
    container_name: ed_quant_engine
    restart: always
    env_file:
      - .env
    environment:
      - TZ=Europe/Istanbul
    volumes:
      - ./paper_db.sqlite3:/app/paper_db.sqlite3
      - ./rf_model.pkl:/app/rf_model.pkl
      - ./logs:/app/logs
      - ./reports:/app/reports
